<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e14" />
  <title>Admin — Football</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="login-page">
    <span id="langToggle" style="position: absolute; top: 18px; right: 18px;"></span>
    <form id="loginForm" class="login-card fade-in">
      <div class="login-brand">
        <div class="symbol">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 2 L14.5 9 L22 9 L16 13.5 L18.5 21 L12 16.5 L5.5 21 L8 13.5 L2 9 L9.5 9 Z"/>
          </svg>
        </div>
        <h1>Admin</h1>
        <div class="eyebrow" id="clubLabel" style="margin-top: 4px;">Turneringsstyring</div>
      </div>

      <div id="apexNotice" class="alert hidden" data-i18n-html="login.apexNotice" style="background:rgba(241,196,15,0.1); border-color:#f1c40f; color:#f1c40f;">
        Login skal ske fra jeres klub-subdomæne — fx <code>jeresklub.footballapp.dk/login.html</code>
      </div>

      <div id="errorBox" class="alert hidden"></div>

      <div class="field" id="usernameField">
        <label for="username" data-i18n="login.username">Brugernavn</label>
        <input id="username" type="text" autocomplete="username" autofocus required />
      </div>

      <div class="field" id="passwordField">
        <label for="password" data-i18n="login.password">Kodeord</label>
        <input id="password" type="password" autocomplete="current-password" required />
      </div>

      <button type="submit" id="loginBtn" class="btn btn-block" data-i18n="login.signIn">Log ind</button>

      <p class="center muted" style="margin-top: var(--sp-5); font-size: 13px;">
        <a href="/" data-i18n="login.backToPublic" style="color: var(--text-muted);">← Tilbage til forsiden</a>
      </p>
    </form>
  </div>
  <script src="/i18n.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const errorBox = document.getElementById('errorBox');
    const apexNotice = document.getElementById('apexNotice');
    const clubLabel = document.getElementById('clubLabel');
    const usernameField = document.getElementById('usernameField');
    const passwordField = document.getElementById('passwordField');
    const loginBtn = document.getElementById('loginBtn');

    let clubName = null;
    function applyLabels() {
      document.title = clubName ? `Admin — ${clubName}` : FI18N.t('login.title');
      if (!clubName) clubLabel.textContent = FI18N.t(apexNotice.classList.contains('hidden') ? 'login.control' : 'login.noClub');
    }
    FI18N.onChange(applyLabels);
    applyLabels();

    // Hent klub-kontekst først — hvis vi er på apex (ingen klub) blokeres login
    async function init() {
      try {
        const res = await fetch('/api/auth/club-info');
        const data = await res.json();
        if (!data.club) {
          // Apex — vis blokker, skjul login-felter
          apexNotice.classList.remove('hidden');
          usernameField.classList.add('hidden');
          passwordField.classList.add('hidden');
          loginBtn.classList.add('hidden');
          applyLabels();
          return;
        }
        clubName = data.club.name;
        clubLabel.textContent = clubName;
        applyLabels();
      } catch (err) {
        // Fail silently — bruger kan stadig forsøge login
        console.warn('Could not fetch club-info', err);
      }
    }
    init();

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.classList.add('hidden');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error || FI18N.t('login.failed'));
        }
        const data = await res.json();
        localStorage.setItem('football_admin_token', data.token);
        if (data.club) {
          localStorage.setItem('football_club_name', data.club.name);
          localStorage.setItem('football_club_subdomain', data.club.subdomain);
        }
        window.location.href = '/admin.html';
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
