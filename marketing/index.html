<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BadmintonApp.dk</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            color: #eaeaea;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        h1 { font-size: 2.5em; margin-bottom: 0.5em; color: #fff; }
        p  { color: #aaa; margin-bottom: 1.5em; }
        a  {
            display: inline-block;
            background: #533483;
            color: #fff;
            padding: 12px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover { background: #6a45a8; }
    </style>
</head>
<body>
    <div>
        <h1>BadmintonApp.dk</h1>
        <p>Kommende side — under opbygning.</p>
        <a href="https://app.badmintonapp.dk">Gå til appen →</a>
    </div>

</html>
