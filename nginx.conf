# ── Super Admin — admin.badmintonapp.dk + admin.footballapp.dk ──
# Samme UI for begge domæner — super admin håndterer både badminton- og football-klubber
server {
    listen 80;
    server_name admin.badmintonapp.dk admin.footballapp.dk;
    root /usr/share/nginx/html;

    client_max_body_size 50M;

    location = / {
        return 302 /super-admin.html;
    }

    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    location ^~ /uploads/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.html$ {
        add_header Cache-Control "no-cache";
        try_files $uri /index.html;
    }

    location ~* \.js$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }
}

# ── Football Marketing — footballapp.dk + www.footballapp.dk ──
# Statisk landing-side (samme mønster som badmintonapp.dk's marketing).
# Klub-subdomæner (lyngby.footballapp.dk osv.) håndteres af det næste block.
server {
    listen 80;
    server_name footballapp.dk www.footballapp.dk;
    root /usr/share/nginx/football-marketing;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.css$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location ~* \.js$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}

# ── Football Klub-subdomæner — <klub>.footballapp.dk ──
# Tenant middleware i football-backend udleder klub fra Host-headeren.
# Subdomæne `admin` håndteres af det dedikerede super-admin block ovenfor.
server {
    listen 80;
    server_name ~^(?<club>[a-z0-9-]+)\.footballapp\.dk$;

    client_max_body_size 5M;

    location / {
        proxy_pass http://football-frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }
}

# ── App — app.badmintonapp.dk og alt andet ──────────────────
server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Allow larger file uploads (for sponsor images)
    client_max_body_size 50M;

    # Device token entry links — proxyes til backend
    location /t/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
    }

    # Proxy uploads to backend (^~ gives priority over regex locations)
    location ^~ /uploads/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_valid 200 1d;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # Frontend routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # HTML: revalidér altid (no-cache), så nye ?v=-referencer til CSS/JS
    # opdages med det samme i stedet for at hænge på en heuristisk cachet side.
    # try_files bevarer SPA-fallbacket for ukendte stier.
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
        try_files $uri /index.html;
    }

    # Disable cache for JS files to ensure updates are loaded
    location ~* \.js$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Cache only images
    location ~* \.(png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Minimal cache for CSS
    location ~* \.css$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }
}