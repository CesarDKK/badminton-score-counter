<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Badminton Pointtæller - Vælg Bane</title>
    <link rel="icon" type="image/png" href="/favicon.png?v=4">
    <link rel="stylesheet" href="fonts.css">
    <link rel="stylesheet" href="landing-styles.css">
    <script src="js/theme-loader.js?v=2"></script>
</head>
<body>
    <div class="bg-glow"></div>

    <div class="container">
        <header>
            <div class="header-brand">
                <div class="brand-icon">🏸</div>
                <h1>Badminton<br><span>Pointtæller</span></h1>
            </div>

        <section class="court-selection">

            <div id="courtButtons" class="court-grid"></div>

        <section class="tv-section">

        </section>

        <section class="overview-section">
            <a href="oversigt.html" class="overview-link">
                <div class="overview-left">
                    <span class="overview-tag">Oversigt</span>
                    <span class="overview-title">Kampstatus</span>
                </div>
                <div class="overview-arrow">→</div>

    <script src="js/api.js?v=2"></script>
