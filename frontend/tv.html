<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bane TV Visning</title>
    <link rel="icon" type="image/png" href="/favicon.png?v=4">
    <link rel="stylesheet" href="tv-styles.css">
    <script src="js/theme-loader.js"></script>
</head>
<body>
    <div class="tv-container">
        <div class="tv-header">
            <h1>BANE <span id="courtNumber">1</span></h1>
            <div class="timer-large" id="timerDisplay">00:00</div>
        </div>

        <div class="scoreboard">
            <div class="player-column">
                <div class="player-names-group">
                    <div class="player-name" id="player1Name">Spiller 1</div>
                    <div class="player-name player-name-partner" id="player1Name2" style="display: none;">Makker 1</div>
                </div>
                <div class="player-score" id="player1Score">0</div>
                <div class="player-games">
                    <span class="games-label">Sæt</span>
                    <span class="games-value" id="player1Games">0</span>
                </div>
            </div>

            <div class="vs-separator">VS</div>

            <div class="player-column">
                <div class="player-names-group">
                    <div class="player-name" id="player2Name">Spiller 2</div>
                    <div class="player-name player-name-partner" id="player2Name2" style="display: none;">Makker 2</div>
                </div>
                <div class="player-score" id="player2Score">0</div>
                <div class="player-games">
                    <span class="games-label">Sæt</span>
                    <span class="games-value" id="player2Games">0</span>
                </div>
            </div>
        </div>

        <div class="tv-footer">
            <div class="live-indicator">
                <span class="live-dot"></span>
                LIVE
            </div>
        </div>
    </div>

    <!-- Rest Break Overlay -->
    <div id="tvRestBreakOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--color-bg-dark); z-index: 9999; justify-content: center; align-items: center;">
        <div style="text-align: center; color: white; width: 90%; max-width: 1600px;">
            <!-- Title -->
            <h1 id="tvRestBreakTitle" style="font-size: 3em; margin-bottom: 25px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: #ffffff;">⏸️ Pause 1 minut</h1>

            <!-- Timer -->
            <div style="position: relative; display: inline-block; margin-bottom: 30px;">
                <div id="tvRestBreakTimer" style="font-size: 10em; font-weight: 900; color: #4CAF50;">60</div>
                <div style="position: absolute; bottom: -15px; left: 50%; transform: translateX(-50%); font-size: 1.3em; color: #aaa; letter-spacing: 2px;">SEKUNDER</div>
            </div>

            <!-- Score Display with Cards -->
            <div style="display: flex; justify-content: center; align-items: center; gap: 40px; margin: 35px 0;">
                <!-- Player 1 Card -->
                <div style="background: var(--color-bg-card); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 25px 40px; min-width: 320px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);">
                    <div style="font-size: 1.8em; margin-bottom: 12px; color: #eaeaea; font-weight: 600;" id="tvRestBreakPlayer1">Spiller 1</div>
                    <div id="tvRestBreakPlayer1Partner" style="font-size: 1.4em; color: #aaa; margin-bottom: 18px; display: none;"></div>
                    <div style="font-size: 6em; font-weight: 900; color: var(--color-accent);" id="tvRestBreakScore1">0</div>
                    <div style="font-size: 1.2em; color: #888; margin-top: 8px; text-transform: uppercase; letter-spacing: 2px;">POINT</div>
                </div>

                <!-- VS Divider -->
                <div style="font-size: 3.5em; font-weight: bold; color: var(--color-primary);">VS</div>

                <!-- Player 2 Card -->
                <div style="background: var(--color-bg-card); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 25px 40px; min-width: 320px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);">
                    <div style="font-size: 1.8em; margin-bottom: 12px; color: #eaeaea; font-weight: 600;" id="tvRestBreakPlayer2">Spiller 2</div>
                    <div id="tvRestBreakPlayer2Partner" style="font-size: 1.4em; color: #aaa; margin-bottom: 18px; display: none;"></div>
                    <div style="font-size: 6em; font-weight: 900; color: var(--color-accent);" id="tvRestBreakScore2">0</div>
                    <div style="font-size: 1.2em; color: #888; margin-top: 8px; text-transform: uppercase; letter-spacing: 2px;">POINT</div>
                </div>
            </div>

            <!-- Set Score Display with Badges -->
            <div style="margin-top: 35px; padding: 20px; background: var(--color-bg-container); border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1);">
                <div style="font-size: 1.4em; color: #aaa; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px;">Sæt Oversigt</div>
                <div style="display: flex; justify-content: center; align-items: center; gap: 25px; font-size: 3em; font-weight: bold;">
                    <div style="background: var(--color-bg-card); border: 2px solid var(--color-primary); border-radius: 12px; padding: 15px 40px; min-width: 120px;">
                        <span id="tvRestBreakGames1" style="color: #ffffff;">0</span>
                    </div>
                    <div style="color: #666;">—</div>
                    <div style="background: var(--color-bg-card); border: 2px solid var(--color-primary); border-radius: 12px; padding: 15px 40px; min-width: 120px;">
                        <span id="tvRestBreakGames2" style="color: #ffffff;">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Match Finished Overlay -->
    <div id="tvMatchFinishedOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--color-bg-dark); z-index: 9999; justify-content: center; align-items: center;">
        <div style="text-align: center; color: white; max-width: 95%; width: 100%; padding: 40px 30px; display: flex; flex-direction: column; justify-content: center; gap: 25px; height: 100vh;">
            <!-- Title -->
            <h1 style="font-size: 4em; margin: 10px 0; font-weight: 700; color: #ffffff; text-transform: uppercase; letter-spacing: 4px;">KAMP AFGJORT</h1>

            <!-- Winner announcement -->
            <div style="margin: 15px 0; padding: 30px 40px; background: var(--color-bg-card); border: 2px solid #4CAF50; border-radius: 12px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);">
                <div style="font-size: 2em; color: #4CAF50; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; font-weight: 600;">🎉 VINDER 🎉</div>
                <div id="tvFinishedWinner" style="font-size: 3.5em; color: #fff; font-weight: 700;">Spiller</div>
            </div>

            <!-- Set scores breakdown -->
            <div id="tvSetScoresContainer" style="font-size: 1.6em; color: #aaa; margin: 15px 0; padding: 25px; background: var(--color-bg-container); border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1);">
                <!-- Set scores will be inserted here -->
            </div>
        </div>
    </div>

    <style>
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
    </style>

    <script src="js/api-v2.js"></script>
    <script src="tv-script-v2.js"></script>
</body>
</html>
