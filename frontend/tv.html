<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bane TV Visning</title>
    <link rel="icon" type="image/png" href="/favicon.png?v=4">
    <link rel="stylesheet" href="fonts.css">
    <link rel="stylesheet" href="tv-styles.css">
    <script src="js/theme-loader.js"></script>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="tv-container">
        <div class="tv-header">
            <h1>BANE <span id="courtNumber">1</span></h1>
            <div class="timer-large" id="timerDisplay">00:00</div>
        </div>

        <div class="scoreboard">
            <div class="player-column">
                <div class="player-names-group">
                    <div class="player-name" id="player1Name">Spiller 1</div>
                    <div class="player-name player-name-partner" id="player1Name2" style="display: none;">Makker 1</div>
                </div>
                <div class="player-score" id="player1Score">0</div>
                <div class="player-games">
                    <span class="games-label">Sæt</span>
                    <span class="games-value" id="player1Games">0</span>
                </div>
            </div>

            <div class="vs-separator">VS</div>

            <div class="player-column">
                <div class="player-names-group">
                    <div class="player-name" id="player2Name">Spiller 2</div>
                    <div class="player-name player-name-partner" id="player2Name2" style="display: none;">Makker 2</div>
                </div>
                <div class="player-score" id="player2Score">0</div>
                <div class="player-games">
                    <span class="games-label">Sæt</span>
                    <span class="games-value" id="player2Games">0</span>
                </div>
            </div>
        </div>

        <div class="tv-footer">
            <div class="live-indicator">
                <span class="live-dot"></span>
                LIVE
            </div>
        </div>
    </div>

    <!-- Rest Break Overlay -->
    <div id="tvRestBreakOverlay" class="tv-overlay">
        <div class="overlay-glow"></div>
        <div class="overlay-content">
            <div class="overlay-title-row">
                <h1 id="tvRestBreakTitle" class="overlay-heading">Pause 1 minut</h1>
            </div>
            <div class="overlay-timer-wrap">
                <div id="tvRestBreakTimer" class="overlay-countdown">60</div>
                <div class="overlay-timer-label">SEKUNDER</div>
            </div>
            <div class="overlay-score-row">
                <div class="overlay-player-card">
                    <div class="overlay-player-name" id="tvRestBreakPlayer1">Spiller 1</div>
                    <div class="overlay-player-partner" id="tvRestBreakPlayer1Partner"></div>
                    <div class="overlay-score" id="tvRestBreakScore1">0</div>
                    <div class="overlay-score-label">POINT</div>
                </div>
                <div class="overlay-vs">VS</div>
                <div class="overlay-player-card">
                    <div class="overlay-player-name" id="tvRestBreakPlayer2">Spiller 2</div>
                    <div class="overlay-player-partner" id="tvRestBreakPlayer2Partner"></div>
                    <div class="overlay-score" id="tvRestBreakScore2">0</div>
                    <div class="overlay-score-label">POINT</div>
                </div>
            </div>
            <div class="overlay-sets-row">
                <div class="overlay-sets-label">SÆT OVERSIGT</div>
                <div class="overlay-sets-scores">
                    <div class="overlay-set-badge"><span id="tvRestBreakGames1">0</span></div>
                    <div class="overlay-sets-dash">—</div>
                    <div class="overlay-set-badge"><span id="tvRestBreakGames2">0</span></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Match Finished Overlay -->
    <div id="tvMatchFinishedOverlay" class="tv-overlay">
        <div class="overlay-glow"></div>
        <div class="overlay-content overlay-content--finished">
            <div class="overlay-finished-title">KAMP AFGJORT</div>
            <div class="overlay-winner-card">
                <div class="overlay-winner-label">VINDER</div>
                <div id="tvFinishedWinner" class="overlay-winner-name">Spiller</div>
            </div>
            <div id="tvSetScoresContainer" class="overlay-set-history"></div>
        </div>
    </div>

    <!-- QR-kode hjørne — kun synlig i klub-mode -->
    <div id="qrCorner" style="display:none; position:fixed; bottom:18px; right:18px; background:rgba(0,0,0,0.55); border-radius:12px; padding:10px 10px 6px; text-align:center; backdrop-filter:blur(6px); z-index:50;">
        <img src="/api/qr-code" style="width:90px; height:90px; display:block;">
        <p style="color:rgba(255,255,255,0.75); font-size:0.62em; margin:5px 0 0; letter-spacing:0.12em; font-family:'Bebas Neue',sans-serif;">FØLG LIVE</p>
    </div>

    <script src="js/api-v2.js"></script>
    <script src="js/auth-guard.js?v=2"></script>
    <script src="tv-script-v2.js"></script>
    <script>
        fetch('/api/mode').then(r => r.json()).then(m => {
            if (m.mode === 'club') document.getElementById('qrCorner').style.display = 'block';
        }).catch(() => {});
    </script>
</body>
</html>
