<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bane TV Visning - V3</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=5">
    <link rel="icon" type="image/png" href="/favicon.png?v=5">
    <link rel="stylesheet" href="fonts.css">
    <link rel="stylesheet" href="tv-v3-styles.css?v=16">
    <script src="js/theme-loader.js?v=3"></script>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="tv-container">
        <!-- Header with court number and timer -->
        <div class="tv-header">
            <h1>BANE <span id="courtNumber">1</span></h1>
            <div class="timer-display" id="timerDisplay">00:00</div>
        </div>

        <!-- Main scoreboard -->
        <div class="scoreboard">
            <!-- Team 1 -->
            <div class="team-row" id="team1Row">
                <img class="tv-team-logo" id="team1Logo" alt="" style="display:none;" onerror="this.style.display='none'">
                <div class="team-names">
                    <div class="tv-player-row"><img class="tv-player-logo" id="player1Logo" alt="" style="display:none;" onerror="this.style.display='none'"><div class="player-name" id="player1Name">Spiller 1</div></div>
                    <div class="tv-player-row"><img class="tv-player-logo" id="player1Logo2" alt="" style="display:none;" onerror="this.style.display='none'"><div class="player-name partner-name" id="player1Name2" style="display: none;">Makker 1</div></div>
                </div>
                <div class="set-boxes">
                    <div class="set-box" id="team1Set1">-</div>
                    <div class="set-box" id="team1Set2">-</div>
                    <div class="set-box" id="team1Set3">-</div>
                </div>
            </div>

            <!-- Team 2 -->
            <div class="team-row" id="team2Row">
                <img class="tv-team-logo" id="team2Logo" alt="" style="display:none;" onerror="this.style.display='none'">
                <div class="team-names">
                    <div class="tv-player-row"><img class="tv-player-logo" id="player2Logo" alt="" style="display:none;" onerror="this.style.display='none'"><div class="player-name" id="player2Name">Spiller 2</div></div>
                    <div class="tv-player-row"><img class="tv-player-logo" id="player2Logo2" alt="" style="display:none;" onerror="this.style.display='none'"><div class="player-name partner-name" id="player2Name2" style="display: none;">Makker 2</div></div>
                </div>
                <div class="set-boxes">
                    <div class="set-box" id="team2Set1">-</div>
                    <div class="set-box" id="team2Set2">-</div>
                    <div class="set-box" id="team2Set3">-</div>
                </div>
            </div>
        </div>

        <!-- Footer with sponsor banner or LIVE indicator -->
        <div class="tv-footer">
            <div class="live-indicator">
                <span class="live-dot"></span>
                LIVE
            </div>
        </div>
    </div>

    <!-- Rest Break Overlay — broadcast-layout: spillerne fylder siderne, countdown-ring i midten -->
    <div id="tvRestBreakOverlay" class="tv-overlay">
        <div class="overlay-glow"></div>
        <div class="pause-layout">
            <div class="pause-player">
                <div class="pause-player-name" id="tvRestBreakPlayer1">Spiller 1</div>
                <div class="pause-player-partner" id="tvRestBreakPlayer1Partner"></div>
                <div class="pause-score" id="tvRestBreakScore1">0</div>
                <div class="pause-score-label">Point</div>
            </div>
            <div class="pause-center">
                <h1 id="tvRestBreakTitle" class="pause-title">Pause 1 minut</h1>
                <div class="pause-ring-wrap">
                    <svg class="pause-ring" viewBox="0 0 200 200" aria-hidden="true">
                        <circle class="pause-ring-track" cx="100" cy="100" r="90"/>
                        <circle class="pause-ring-fill" id="tvRestBreakRing" cx="100" cy="100" r="90"/>
                    </svg>
                    <div class="pause-ring-inner">
                        <div id="tvRestBreakTimer" class="pause-countdown">60</div>
                        <div class="pause-countdown-label">Tilbage</div>
                    </div>
                </div>
                <div class="pause-sets">
                    <span class="pause-sets-label">Sæt</span>
                    <span class="pause-set-badge" id="tvRestBreakGames1">0</span>
                    <span class="pause-sets-dash">–</span>
                    <span class="pause-set-badge" id="tvRestBreakGames2">0</span>
                </div>
            </div>
            <div class="pause-player">
                <div class="pause-player-name" id="tvRestBreakPlayer2">Spiller 2</div>
                <div class="pause-player-partner" id="tvRestBreakPlayer2Partner"></div>
                <div class="pause-score" id="tvRestBreakScore2">0</div>
                <div class="pause-score-label">Point</div>
            </div>
        </div>
    </div>

    <!-- QR Counter — kun synlig i klub-mode når banen er ledig. Vises ovenpå slideshow. -->
    <div id="qrCounter" class="qr-counter" style="display: none;">
        <div class="qr-counter__label">TÆL MED DIN TELEFON</div>
        <img id="qrCounterImage" class="qr-counter__image" alt="Scan med telefon for at tælle kampen">
        <div class="qr-counter__hint">Scan med telefon</div>
    </div>

    <!-- Match Finished Overlay -->
    <div id="tvMatchFinishedOverlay" class="tv-overlay">
        <div class="overlay-glow"></div>
        <div class="overlay-content overlay-content--finished">
            <div class="overlay-finished-title">KAMP AFGJORT</div>
            <div class="overlay-winner-card">
                <div class="overlay-winner-label">VINDER</div>
                <div id="tvFinishedWinner" class="overlay-winner-name">Spiller</div>
            </div>
            <div id="tvSetScoresContainer" class="overlay-set-history"></div>
        </div>
    </div>

    <script src="js/api-v2.js?v=2"></script>
    <script src="js/auth-guard.js?v=2"></script>
    <script src="js/logo-match.js?v=1"></script>
    <script src="js/live-updates.js?v=1"></script>
    <script src="tv-script-v3.js?v=22"></script>
</body>
</html>
