<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin — Badminton App</title>
    <link rel="icon" type="image/png" href="/favicon.png?v=4">
    <link rel="stylesheet" href="fonts.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="super-admin-styles.css">
    <script src="js/theme-loader.js"></script>
</head>
<body>
    <div class="bg-glow"></div>

    <!-- LOGIN -->
    <div id="loginScreen">
        <div class="login-wrap">
            <div class="login-card">
                <div class="brand">
                    <div class="brand-icon">⚙️</div>
                    <h1>Super Admin</h1>
                    <p class="subtitle">Badminton App administration</p>
                </div>
                <div class="form-group">
                    <label>Brugernavn</label>
                    <input type="text" id="saUsername" placeholder="Brugernavn" autocomplete="username" autofocus>
                </div>
                <div class="form-group">
                    <label>Adgangskode</label>
                    <input type="password" id="saPassword" placeholder="Adgangskode" autocomplete="current-password">
                </div>
                <button id="saLoginBtn" class="btn-primary full">Log Ind</button>
                <div id="loginError" class="msg msg-error" style="display:none;"></div>
            </div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" style="display:none;">
        <div class="container">
            <header>
                <div>
                    <h1>Super Admin</h1>
                    <div class="subtitle">Badminton App — Klub administration</div>
                </div>
                <button id="saLogoutBtn" class="btn-secondary">Log Ud</button>
            </header>

            <!-- Opret ny klub -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">Opret Ny Klub</span>
                </div>
                <div class="create-form">
                    <div class="form-group" style="margin-bottom:0">
                        <label>Klubnavn</label>
                        <input type="text" id="newClubName" placeholder="fx Aarhus Badminton Klub">
                    </div>
                    <div class="form-group" style="margin-bottom:0">
                        <label>Subdomain</label>
                        <input type="text" id="newClubSubdomain" placeholder="fx aarhus-badminton">
                    </div>
                    <button id="createClubBtn" class="btn-primary" style="height:46px; margin-top:22px;">Opret Klub</button>
                </div>
                <div id="createClubMsg" class="msg" style="display:none;"></div>
            </div>

            <!-- Klub liste -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">Klubber</span>
                    <button id="refreshClubsBtn" class="btn-secondary">↻ Opdater</button>
                </div>
                <div id="clubList">
                    <div class="empty-state"><div class="spinner"></div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL: Bekræft slet klub -->
    <div id="deleteModal" class="modal-overlay" style="display:none;">
        <div class="modal-box" style="max-width:420px;">
            <div class="modal-header">
                <span class="modal-title" style="color:#e94560;">⚠ Slet Klub</span>
            </div>
            <p id="deleteModalText" style="color:rgba(255,255,255,0.7); font-size:0.92em; line-height:1.6; margin-bottom:16px;"></p>
            <div style="background:rgba(233,69,96,0.08); border:1px solid rgba(233,69,96,0.2); border-radius:8px; padding:12px 14px; margin-bottom:20px; font-size:0.85em; color:rgba(255,255,255,0.5); line-height:1.6;">
                Dette sletter permanent:<br>
                • Al klubdata (baner, bookinger, spillere)<br>
                • Alle admin-brugere<br>
                • Hele klubbens database
            </div>
            <div class="form-group">
                <label>Skriv <strong style="color:#e94560;">SLET</strong> for at bekræfte</label>
                <input type="text" id="deleteConfirmInput" placeholder="SLET" autocomplete="off">
            </div>
            <div style="display:flex; gap:10px; margin-top:8px;">
                <button id="deleteConfirmBtn" class="btn-danger" style="flex:1; padding:11px;">Slet klub permanent</button>
                <button id="deleteCancelBtn" class="btn-secondary" style="flex:1; padding:11px;">Annuller</button>
            </div>
            <div id="deleteModalMsg" class="msg" style="display:none;"></div>
        </div>
    </div>

    <!-- MODAL: Bekræft slet admin -->
    <div id="deleteAdminModal" class="modal-overlay" style="display:none; z-index:10001;">
        <div class="modal-box" style="max-width:380px;">
            <div class="modal-header">
                <span class="modal-title" style="color:#e94560;">Slet Admin</span>
            </div>
            <p id="deleteAdminModalText" style="color:rgba(255,255,255,0.7); font-size:0.92em; line-height:1.6; margin-bottom:20px;"></p>
            <div style="display:flex; gap:10px;">
                <button id="deleteAdminConfirmBtn" class="btn-danger" style="flex:1; padding:11px;">Slet</button>
                <button id="deleteAdminCancelBtn" class="btn-secondary" style="flex:1; padding:11px;">Annuller</button>
            </div>
            <div id="deleteAdminModalMsg" class="msg" style="display:none;"></div>
        </div>
    </div>

    <!-- MODAL: Klub admin -->
    <div id="adminModal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <div class="modal-header">
                <span class="modal-title" id="adminModalTitle">Klub Admins</span>
                <button class="modal-close" id="adminModalClose">✕</button>
            </div>
            <div id="adminModalList" class="admin-list"></div>
            <div style="border-top: 1px solid rgba(255,255,255,0.08); padding-top: 20px; margin-top: 8px;">
                <div class="card-title" style="font-size:1.1em; margin-bottom:16px;">Opret Admin Bruger</div>
                <div class="form-group">
                    <label>Brugernavn</label>
                    <input type="text" id="newAdminUsername" placeholder="brugernavn">
                </div>
                <div class="form-group">
                    <label>Adgangskode (min. 8 tegn)</label>
                    <input type="password" id="newAdminPassword" placeholder="adgangskode">
                </div>
                <div class="form-group">
                    <label>E-mail (valgfri)</label>
                    <input type="email" id="newAdminEmail" placeholder="email@klub.dk">
                </div>
                <button id="createAdminBtn" class="btn-primary">Opret Admin</button>
                <div id="createAdminMsg" class="msg" style="display:none;"></div>
            </div>
        </div>
    </div>

    <script src="js/api.js?v=3"></script>
    <script src="super-admin-script.js?v=4"></script>
</body>
</html>
