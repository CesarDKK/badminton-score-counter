      <ellipse cx="12" cy="7.7" rx="1.5" ry="6.8" transform="rotate(-14 12 14.5)"/>
      <ellipse cx="12" cy="7.7" rx="1.5" ry="6.8"/>
      <ellipse cx="12" cy="7.7" rx="1.5" ry="6.8" transform="rotate(14 12 14.5)"/>
      <ellipse cx="12" cy="7.7" rx="1.5" ry="6.8" transform="rotate(33 12 14.5)"/>
    </g>
    <g fill="#e94560">
      <rect x="9.4" y="14.3" width="5.2" height="1.7" rx="0.85"/>
