﻿<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oversigt - Alle Aktive Kampe</title>
    <link rel="icon" type="image/png" href="/favicon.png?v=4">
    <link rel="stylesheet" href="fonts.css">
    <link rel="stylesheet" href="oversigt-styles.css?v=23">
    <script src="js/theme-loader.js?v=3"></script>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="overview-container">
        <div class="overview-header">
            <div class="header-left">
                <h1>KAMPSTATUS OVERSIGT</h1>
                <div class="page-indicator" id="pageIndicator" style="display: none;">
                    <span id="pageInfo">Side 1 af 1</span>
                </div>
            </div>
        </div>

        <!-- Holdkamp-kort (én holdkamp pr. side, auto-rotation) -->
        <div id="hkRotationBar"><div class="hk-rotation-fill"></div></div>
        <div id="holdkampCardsGrid" style="display:none;"></div>
        <div id="hkPageIndicator" style="display:none;"></div>

        <div class="courts-grid" id="courtsGrid">
            <!-- Court cards will be dynamically generated here -->
        </div>

        <!-- Loading indicator -->
        <div id="loadingIndicator" class="loading-indicator">
            <p>Indlæser kampstatus...</p>
        </div>

        <!-- No active matches message (hidden — replaced by idleScreen) -->
        <div id="noMatchesMessage" class="no-matches-message" style="display: none;"></div>
    </div>

    <!-- Idle screen: full-screen overlay shown when no matches are active -->
    <div id="idleScreen" class="idle-screen" style="display:none;"></div>

    <script src="js/api.js?v=4"></script>
    <script src="js/logo-match.js?v=1"></script>
    <script src="js/live-updates.js?v=1"></script>
    <script src="oversigt-script.js?v=21"></script>
</body>
</html>
