<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oversigt - Alle Aktive Kampe</title>
    <link rel="icon" type="image/png" href="/favicon.png?v=4">
    <link rel="stylesheet" href="fonts.css">
    <link rel="stylesheet" href="oversigt-styles.css?v=12">
    <script src="js/theme-loader.js"></script>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="overview-container">
        <div class="overview-header">
            <div class="header-left">
                <h1>KAMPSTATUS OVERSIGT</h1>
                <div class="page-indicator" id="pageIndicator" style="display: none;">
                    <span id="pageInfo">Side 1 af 1</span>
                </div>
            </div>
        </div>

        <!-- Holdkamp Panel (shown when active team match exists) -->
        <div id="holdkampOverview" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <div style="display:flex; align-items:baseline; gap:16px; flex-wrap:wrap;">
                    <div style="display:flex; align-items:baseline; gap:clamp(20px,3vw,60px);">
                        <span id="hk_team1Name" style="font-family:'Bebas Neue',sans-serif; font-size:clamp(4em,9vw,8em); color:#4CAF50; letter-spacing:2px; line-height:1;"></span>
                        <span id="hk_score" style="font-family:'Bebas Neue',sans-serif; font-size:clamp(4em,9vw,8em); color:#fff; letter-spacing:8px; line-height:1;"></span>
                        <span id="hk_team2Name" style="font-family:'Bebas Neue',sans-serif; font-size:clamp(4em,9vw,8em); color:#e94560; letter-spacing:2px; line-height:1;"></span>
                    </div>
                    <div style="color:rgba(255,255,255,0.3); font-size:0.75em; letter-spacing:2px; text-transform:uppercase;" id="holdkampFormatLabel"></div>
                </div>
                <div style="color:rgba(255,255,255,0.3); font-size:0.8em; letter-spacing:2px;">🏸 HOLDKAMP</div>
            </div>
            <div id="holdkampGamesGrid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:6px;"></div>
        </div>

        <div class="courts-grid" id="courtsGrid">
            <!-- Court cards will be dynamically generated here -->
        </div>

        <!-- Loading indicator -->
        <div id="loadingIndicator" class="loading-indicator">
            <p>Indlæser kampstatus...</p>
        </div>

        <!-- No active matches message (hidden — replaced by idleScreen) -->
        <div id="noMatchesMessage" class="no-matches-message" style="display: none;"></div>
    </div>

    <!-- Idle screen: full-screen overlay shown when no matches are active -->
    <div id="idleScreen" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#0f0e17; overflow:hidden; z-index:200;"></div>

    <script src="js/api.js?v=2"></script>
    <script src="oversigt-script.js?v=4"></script>
</body>
</html>
