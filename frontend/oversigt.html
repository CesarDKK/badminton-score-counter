<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oversigt - Alle Aktive Kampe</title>
    <link rel="icon" type="image/png" href="/favicon.png?v=4">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="oversigt-styles.css">
    <script src="js/theme-loader.js"></script>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="overview-container">
        <div class="overview-header">
            <div class="header-left">
                <h1>KAMPSTATUS OVERSIGT</h1>
                <div class="page-indicator" id="pageIndicator" style="display: none;">
                    <span id="pageInfo">Side 1 af 1</span>
                </div>
            </div>
        </div>

        <!-- Holdkamp Panel (shown when active team match exists) -->
        <div id="holdkampOverview" style="display:none; margin-bottom:20px; background:rgba(20,10,40,0.95); border:2px solid #533483; border-radius:12px; padding:20px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <div>
                    <div style="color:#aaa; font-size:0.85em; margin-bottom:4px;" id="holdkampFormatLabel"></div>
                    <div style="font-size:2em; font-weight:bold; color:#fff;">
                        <span id="hk_team1Name" style="color:#4CAF50;"></span>
                        <span id="hk_score" style="margin:0 20px; color:#fff;"></span>
                        <span id="hk_team2Name" style="color:#e94560;"></span>
                    </div>
                </div>
                <div style="color:#aaa; font-size:0.9em;">🏸 HOLDKAMP</div>
            </div>
            <div id="holdkampGamesGrid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:8px;"></div>
        </div>

        <div class="courts-grid" id="courtsGrid">
            <!-- Court cards will be dynamically generated here -->
        </div>

        <!-- Loading indicator -->
        <div id="loadingIndicator" class="loading-indicator">
            <p>Indlæser kampstatus...</p>
        </div>

        <!-- No active matches message -->
        <div id="noMatchesMessage" class="no-matches-message" style="display: none;">
            <h2>Ingen Aktive Kampe</h2>
            <p>Der er ingen kampe i gang i øjeblikket</p>
        </div>
    </div>

    <script src="js/api.js?v=2"></script>
    <script src="oversigt-script.js?v=2"></script>
</body>
</html>
