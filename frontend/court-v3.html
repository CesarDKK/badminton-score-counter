<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Badminton Pointtæller - Bane (Ny Version)</title>
    <link rel="icon" type="image/png" href="/favicon.png?v=4">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="fonts.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="court-v3-styles.css?v=17">
    <script src="js/theme-loader.js"></script>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <!-- Score Display Above Court -->
        <div class="score-display-top">
            <!-- Scores Container -->
            <div class="scores-container">
                <!-- Player 1 Score (Left) -->
                <div class="player-score-section player-score-left">
                    <div class="point-score" id="player1PointScore">0</div>
                </div>

                <!-- Set Score (Center) -->
                <div class="set-score-section">
                    <div class="set-label">Sæt Vundet</div>
                    <div class="set-score">
                        <span id="player1SetScore">0</span>
                        <span class="set-separator">-</span>
                        <span id="player2SetScore">0</span>
                    </div>
                </div>

                <!-- Player 2 Score (Right) -->
                <div class="player-score-section player-score-right">
                    <div class="point-score" id="player2PointScore">0</div>
                </div>
            </div>
        </div>

        <!-- Court + side +1 buttons -->
        <div class="court-middle-row">
        <button id="addPointPlayer1" class="btn-add-point btn-add-left" disabled>+1</button>
        <div class="court-view-container">
            <div class="badminton-court">
                <!-- Court surface (green) -->
                <div class="court-surface">
                    <!-- White lines -->
                    <div class="court-line line-outer"></div>
                    <!-- Net line at center (50% width) -->
                    <div class="court-line line-net"></div>
                    <!-- Center horizontal lines (divides service courts in back court only) -->
                    <div class="court-line line-center-horizontal-left"></div>
                    <div class="court-line line-center-horizontal-right"></div>
                    <!-- Short service lines (1.98m from net on each side) -->
                    <div class="court-line line-short-service-left"></div>
                    <div class="court-line line-short-service-right"></div>
                    <!-- Long service lines for doubles (0.76m from back) -->
                    <div class="court-line line-long-service-left"></div>
                    <div class="court-line line-long-service-right"></div>
                    <!-- Singles sidelines -->
                    <div class="court-line line-singles-sideline-top"></div>
                    <div class="court-line line-singles-sideline-bottom"></div>

                    <!-- Player names in service boxes -->
                    <!-- Left back court boxes (Player 1 side) -->
                    <div class="player-name-box player-left-top">
                        <div class="player-name" id="player1Name1Display"></div>
                    </div>
                    <div class="player-name-box player-left-bottom">
                        <div class="player-name" id="player1Name2Display"></div>
                    </div>

                    <!-- Swap button for Player 1 side -->
                    <button id="swapPlayer1Btn" class="btn-swap-players btn-swap-left" style="display: none;">⇅</button>

                    <!-- Right back court boxes (Player 2 side) -->
                    <div class="player-name-box player-right-top">
                        <div class="player-name" id="player2Name1Display"></div>
                    </div>
                    <div class="player-name-box player-right-bottom">
                        <div class="player-name" id="player2Name2Display"></div>
                    </div>

                    <!-- Swap button for Player 2 side -->
                    <button id="swapPlayer2Btn" class="btn-swap-players btn-swap-right" style="display: none;">⇅</button>

                    <!-- Switch Sides button on the net -->
                    <button id="switchSidesCourtBtn" class="btn-switch-sides">
                        <span class="btn-switch-sides-icon">⇆</span>
                        <span class="btn-switch-sides-label">Skift side</span>
                    </button>

                    <!-- Court name display (before match) -->
                    <div id="courtNameDisplay" class="court-name-display"></div>

                    <!-- Timer and Start Button overlay on court center -->
                    <div class="court-center-overlay">
                        <button id="startMatchBtn" class="btn-start-match-center">Start Kamp</button>
                        <div id="timerDisplay" class="timer-display-center" style="display: none;">00:00</div>
                    </div>
                </div>
            </div>
        </div>
        <button id="addPointPlayer2" class="btn-add-point btn-add-right" disabled>+1</button>
        </div><!-- end court-middle-row -->

        <!-- Control Buttons Below Court -->
        <div class="control-buttons-bottom">
            <button id="startServPlayer1" class="btn-start-serv">Start serv</button>
            <div class="center-buttons">
                <button id="undoBtn" class="btn-undo">Fortryd</button>
                <button id="settingsBtn" class="btn-settings">⚙️</button>
            </div>
            <button id="startServPlayer2" class="btn-start-serv">Start serv</button>
        </div>


        <!-- Holdkamp Panel (hidden until active team match) -->
        <div id="holdkampPanel" style="display:none; position:fixed; top:0; left:0; right:0; background:rgba(20,10,40,0.97); z-index:8000; padding:15px 20px; border-bottom:2px solid #533483;">
            <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
                <span style="color:#e94560; font-weight:bold; font-size:0.95em;">🏸 Holdkamp:</span>
                <select id="holdkampGameSelect" style="flex:1; min-width:200px; padding:8px 10px; background:#1a1a2e; color:#eaeaea; border:1px solid #533483; border-radius:5px; font-size:0.9em;">
                    <option value="">-- Vælg delkamp --</option>
                </select>
                <button id="assignHoldkampBtn" style="padding:8px 16px; background:#533483; color:#fff; border:none; border-radius:5px; cursor:pointer; font-size:0.9em;">Tilknyt</button>
                <button id="closeHoldkampPanelBtn" style="padding:8px 12px; background:transparent; color:#aaa; border:1px solid #555; border-radius:5px; cursor:pointer; font-size:0.9em;">✕</button>
            </div>
            <div id="holdkampAssigned" style="display:none; margin-top:8px; color:#4CAF50; font-size:0.85em;"></div>
        </div>

        <!-- Settings Menu (hidden by default) -->
        <div id="settingsMenu" class="settings-menu" style="display: none;">
            <div class="settings-menu-content">
                <h3>Indstillinger</h3>
                <button id="switchSidesBtn" style="display:none;"></button>
                <button id="doublesToggle" class="menu-item">Skift til Double</button>
                <button id="gameModeToggle" class="menu-item">Format: 21/30</button>
                <button id="showHoldkampPanelBtn" class="menu-item" style="display:none;">🏸 Holdkamp</button>
                <button id="clearCourtBtn" class="menu-item menu-danger">Ryd Banen</button>
                <a href="admin.html" class="menu-item menu-link">Admin</a>
                <a href="landing.html" class="menu-item menu-link">← Tilbage</a>
                <button id="installAppBtn" class="menu-item" style="display: none;">📲 Installer som App</button>
                <button id="closeSettingsBtn" class="menu-item menu-close">Luk</button>
            </div>
        </div>
    </div>

    <!-- Rest Break Overlay -->
    <div id="restBreakOverlay" class="court-overlay">
        <div class="court-overlay-content">
            <h1 id="restBreakTitle" class="court-overlay-title">Pause</h1>
            <div id="restBreakTimer" class="court-overlay-countdown">60</div>
            <button id="skipRestBreak" class="btn-primary court-overlay-btn">Fortsæt Kamp</button>
        </div>
    </div>

    <!-- Message Overlay -->
    <div id="messageOverlay" class="court-overlay court-overlay--message">
        <div class="court-overlay-content">
            <h1 id="messageTitle" class="court-overlay-message-title"></h1>
            <p id="messageText" class="court-overlay-message-text"></p>
            <div id="messageButtons" class="court-overlay-message-buttons">
                <!-- Buttons will be added dynamically -->
            </div>
        </div>
    </div>

    <!-- Portrait overlay — direct child of body so position:fixed works correctly -->
    <div id="portraitOverlay">
        <div class="portrait-overlay-inner">
            <div class="portrait-rotate-icon">⟳</div>
            <p>Vend telefonen til liggende tilstand for at bruge bane-visningen</p>
        </div>
    </div>

    <script src="js/api.js?v=4"></script>
    <script src="js/auth-guard.js?v=2"></script>
    <script src="court-script-v3.js?v=3"></script>
</body>
</html>
