<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Klub Admin Login</title>
    <link rel="icon" type="image/png" href="/favicon.png?v=4">
    <link rel="stylesheet" href="fonts.css">
    <link rel="stylesheet" href="styles.css?v=3">
    <link rel="stylesheet" href="admin-styles.css?v=3">
    <link rel="stylesheet" href="club-login-styles.css?v=1">
    <script src="js/theme-loader.js?v=3"></script>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="login-wrap">
        <div class="login-card">
            <div class="brand">
                <div class="brand-icon">🏸</div>
                <h1>Klub Admin</h1>
                <p class="subtitle">Log ind for at administrere din klub</p>
            </div>
            <div class="form-group">
                <label>Brugernavn</label>
                <input type="text" id="username" placeholder="Indtast brugernavn" autocomplete="username" autofocus>
            </div>
            <div class="form-group">
                <label>Adgangskode</label>
                <input type="password" id="password" placeholder="Indtast adgangskode" autocomplete="current-password">
            </div>
            <button id="loginBtn" class="btn-login">Log Ind</button>
            <div id="errorMsg" class="error-msg"></div>
        </div>
    </div>
    <script src="js/api.js?v=3"></script>
    <script src="club-login-script.js?v=1"></script>
</body>
</html>
