<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Klub Admin Login</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=5">
    <link rel="icon" type="image/png" href="/favicon.png?v=5">
    <link rel="stylesheet" href="fonts.css">
    <link rel="stylesheet" href="styles.css?v=4">
    <link rel="stylesheet" href="admin-styles.css?v=4">
    <link rel="stylesheet" href="club-login-styles.css?v=4">
    <script src="js/theme-loader.js?v=8"></script>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="login-wrap">
        <div class="login-card">
            <div class="brand">
                <div class="brand-icon"><svg viewBox="0 0 24 24" style="width:1em;height:1em;vertical-align:-0.1em;" aria-hidden="true"><g transform="translate(0 1.2)"><g fill="#fff"><ellipse cx="12" cy="7.7" rx="1.5" ry="6.8" transform="rotate(-33 12 14.5)"/><ellipse cx="12" cy="7.7" rx="1.5" ry="6.8" transform="rotate(-14 12 14.5)"/><ellipse cx="12" cy="7.7" rx="1.5" ry="6.8"/><ellipse cx="12" cy="7.7" rx="1.5" ry="6.8" transform="rotate(14 12 14.5)"/><ellipse cx="12" cy="7.7" rx="1.5" ry="6.8" transform="rotate(33 12 14.5)"/></g><g fill="var(--color-accent, #e94560)"><rect x="9.4" y="14.3" width="5.2" height="1.7" rx="0.85"/><path d="M9.7 16.6h4.6v0.5a2.3 2.3 0 0 1-4.6 0z"/></g></g></svg></div>
                <h1>Klub Admin</h1>
                <p class="subtitle">Log ind for at administrere din klub</p>
            </div>
            <div class="form-group">
                <label>Brugernavn</label>
                <input type="text" id="username" placeholder="Indtast brugernavn" autocomplete="username" autofocus>
            </div>
            <div class="form-group">
                <label>Adgangskode</label>
                <input type="password" id="password" placeholder="Indtast adgangskode" autocomplete="current-password">
            </div>
            <button id="loginBtn" class="btn-login">Log Ind</button>
            <div id="errorMsg" class="error-msg"></div>
        </div>
    </div>
    <script src="js/api.js?v=4"></script>
    <script src="club-login-script.js?v=2"></script>
</body>
</html>
