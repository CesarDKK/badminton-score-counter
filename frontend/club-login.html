<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Klub Admin Login</title>
    <link rel="icon" type="image/png" href="/favicon.png?v=4">
    <link rel="stylesheet" href="fonts.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="admin-styles.css">
    <script src="js/theme-loader.js?v=2"></script>
    <style>
        .login-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: var(--color-bg-container);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            animation: fadeUp 0.35s ease both;
        }
        .login-card .brand {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-card .brand-icon {
            font-size: 2.8em;
            margin-bottom: 8px;
        }
        .login-card h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2em;
            letter-spacing: 0.05em;
            color: #fff;
            margin-bottom: 4px;
        }
        .login-card .subtitle {
            color: rgba(255,255,255,0.45);
            font-size: 0.85em;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 0.78em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: rgba(255,255,255,0.5);
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            background: var(--color-bg-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 12px 14px;
            color: #eaeaea;
            font-family: 'DM Sans', sans-serif;
            font-size: 1em;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--color-primary);
        }
        .btn-login {
            width: 100%;
            padding: 13px;
            background: var(--gradient-primary);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.15em;
            letter-spacing: 0.08em;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s;
        }
        .btn-login:hover { opacity: 0.88; }
        .btn-login:disabled { opacity: 0.45; cursor: not-allowed; }
        .error-msg {
            background: rgba(233, 69, 96, 0.12);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 8px;
            padding: 10px 14px;
            color: #e94560;
            font-size: 0.88em;
            margin-top: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="login-wrap">
        <div class="login-card">
            <div class="brand">
                <div class="brand-icon">🏸</div>
                <h1>Klub Admin</h1>
                <p class="subtitle">Log ind for at administrere din klub</p>
            </div>
            <div class="form-group">
                <label>Brugernavn</label>
                <input type="text" id="username" placeholder="Indtast brugernavn" autocomplete="username" autofocus>
            </div>
            <div class="form-group">
                <label>Adgangskode</label>
                <input type="password" id="password" placeholder="Indtast adgangskode" autocomplete="current-password">
            </div>
            <button id="loginBtn" class="btn-login">Log Ind</button>
            <div id="errorMsg" class="error-msg"></div>
        </div>
    </div>
    <script src="js/api.js?v=3"></script>
    <script src="club-login-script.js?v=1"></script>
</body>
</html>
